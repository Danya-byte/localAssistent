name: CI

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run compile check
        run: python -m compileall src tests

      - name: Run unit tests
        run: powershell -ExecutionPolicy Bypass -File .\scripts\test.ps1

      - name: Enforce 100% coverage
        run: powershell -ExecutionPolicy Bypass -File .\scripts\coverage.ps1

      - name: Build portable app
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build.ps1

      - name: Smoke launch packaged app
        run: powershell -ExecutionPolicy Bypass -File .\scripts\smoke.ps1
